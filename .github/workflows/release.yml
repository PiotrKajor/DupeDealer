# Buduje SteamDupeSeller.exe na Windowsie i dołącza go do GitHub Release.
# Odpala się na tag `v*` (tworzy Release) albo ręcznie (workflow_dispatch):
# z podanym inputem `tag` tworzy tag+Release, bez niego — tylko artefakt
# do pobrania z zakładki Actions.
name: Release .exe

on:
  push:
    tags: ['v*']
    # bootstrap przed merge do master: build z gałęzi PR; Release powstaje
    # tylko gdy wiadomość commita zawiera marker `[release vX.Y.Z]`
    branches: ['claude/steam-dupe-seller-gui-eefsm7']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Wersja release (np. v1.0.0); puste = tylko artefakt'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Selftest CLI (dowód, że logika bez zmian)
        run: python steam_dupe_seller.py --selftest

      - name: Smoke import GUI
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -c "import steam_seller_gui, tiny_qr, gui_theme; print('import OK')"

      - name: PyInstaller
        # --collect-submodules steam.protobufs: pakiet `steam` laduje protobufy
        # dynamicznie — bez tego w .exe zabraknie steammessages_auth_pb2
        run: >-
          pyinstaller --noconfirm --clean --onefile --windowed
          --name SteamDupeSeller
          --icon app.ico
          --add-data "app.ico;."
          --collect-submodules steam.protobufs
          --hidden-import steam.protobufs.steammessages_auth_pb2
          steam_seller_gui.py

      - name: Artefakt buildu
        uses: actions/upload-artifact@v4
        with:
          name: SteamDupeSeller-exe
          path: dist/SteamDupeSeller.exe

      - name: Release (tag push, dispatch z inputem `tag` albo marker w commicie)
        if: >-
          startsWith(github.ref, 'refs/tags/') || inputs.tag != '' ||
          contains(github.event.head_commit.message, '[release ')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.tag }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          # spoza tag-pusha tag jeszcze nie istnieje — gh utworzy go na buildowanym commicie
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"; TARGET=(--target "$GITHUB_SHA")
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"; TARGET=()
          else
            TAG=$(printf '%s' "$HEAD_MSG" | sed -n 's/.*\[release \(v[^]]*\)\].*/\1/p' | head -1)
            TARGET=(--target "$GITHUB_SHA")
          fi
          if [ -z "$TAG" ]; then echo "brak wersji release"; exit 1; fi
          cat > notes.md <<'EOF'
          `SteamDupeSeller.exe` — aplikacja okienkowa do wystawiania duplikatów
          kart/przedmiotów Steam na rynku (zawsze zostaje 1 sztuka każdego rodzaju).

          - pojedynczy plik, bez konsoli (PyInstaller onefile, Windows 64-bit),
            zbudowany automatycznie przez GitHub Actions
          - plik nie jest podpisany — SmartScreen może ostrzec
            („Więcej informacji" → „Uruchom mimo to")
          - token logowania trafia do `%APPDATA%\SteamDupeSeller\refresh_token`;
            hasło nie jest nigdzie zapisywane
          - po wystawieniu ofert: apka Steam Mobile → Potwierdzenia → Zatwierdź wszystko
            (bot nie potwierdza automatycznie)
          EOF
          # sprzątanie release'ów z fazy bootstrapu i ewentualnego poprzedniego biegu
          for old in v1.0.0 v1.0.1 "$TAG"; do
            gh release delete "$old" --cleanup-tag --yes 2>/dev/null || true
          done
          gh release create "$TAG" "${TARGET[@]}" dist/SteamDupeSeller.exe \
            --title "SteamDupeSeller $TAG" \
            --notes-file notes.md
